services:
  - type: web
    name: resume-report-backend
    env: node
    plan: free                # Deploy on Render's free tier
    rootDir: BACKEND          # Root directory for backend code
    buildCommand: npm install # Build command
    startCommand: npm start   # Start command
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false           # Render will prompt the user to input this value
      - key: GOOGLE_GENAI_API_KEY
        sync: false           # Render will prompt the user to input this value
      - key: JWT_SECRET
        sync: false           # Render will prompt the user to input this value
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false           # Render will prompt the user to input this value
